name: Auto Release Build Action
on:
  pull_request:
    branches:
      - 'main'
    types: [closed] # 监听 PR 被关闭的事件

permissions:
  contents: write

env:
  RCVersion: < 0.0.0 PreRelease 0>
  isPreRelease: true
  Version: Init

jobs:
  Build_Release_Application:
    name: Build Release Application
    if: github.event.pull_request.merged == true
    runs-on: windows-2025
    steps:
      - name: CheckOut Repo
        uses: actions/checkout@v4

      - name: Cache and Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
          cache: 'pip' # caching pip dependencies

      - name: Install requirements
        run: pip3 install -r ./requirements.txt

      - name: Append Commits to Changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # 此时 PR 上下文是完整的，可以直接拿到 Number！
          $PR_NUMBER = "${{ github.event.pull_request.number }}"
          Write-Host "当前触发的 PR 编号: #$PR_NUMBER"
          # 直接调用 API 获取该 PR 的所有提交记录
          $COMMITS = gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/commits" | ConvertFrom-Json

          # 定义 changelog 文件路径
          $changelogPath = "${{ github.workspace }}/changelog.md"
          # 如果文件不存在，创建，防止报错
          if (-not (Test-Path $changelogPath)) {
              New-Item -Path $changelogPath -ItemType File | Out-Null
          }

          "`n### 🚀 本次更新包含的 Commits (来自 PR #$PR_NUMBER):`n" | Out-File -FilePath $changelogPath -Encoding utf8 -Append

          Write-Host "Total commits in this PR: $($COMMITS.Count)"

          foreach ($commit in $COMMITS) {
              # 使用安全格式化 (-f) 和换行符替换
              $msg = $commit.commit.message -replace '[\r\n]+', '<br/>'
              $shortHash = $commit.sha.Substring(0,7)

              ("- `{0}` {1}" -f $shortHash, $msg) | Out-File -FilePath $changelogPath -Encoding utf8 -Append
              Write-Host ("- {0} {1}" -f $shortHash, $msg)
          }

      - name: Hardcode Release Type (Release)
        run: |
          $versionPath = "./musync_save/version.py"
          $content = Get-Content -Path $versionPath -Raw
          # 升级版正则：兼容匹配 is_pre_release: bool = True/False
          $content = $content -replace '(?m)^is_pre_release\s*(:\s*bool\s*)?=\s*(True|False)', 'is_pre_release: bool = False'
          Set-Content -Path $versionPath -Value $content -Encoding utf8
          Write-Host "已将 version.py 中的 is_pre_release 强制设置为 False (正式版)"

      - name: Create Build Variable
        run: |
          $ErrorActionPreference = 'Stop';
          cd ./musync_save/;
          $isPreRelease = python -c "import version;print(version.is_pre_release)";
          $isPreReleaseBool = [bool]::Parse($isPreRelease);
          if ($isPreReleaseBool) {
              $version = python -c "import version; print(version.pre_version)";
              $rcVersion = $version -replace "pre", " PreRelease ";
          } else {
              $version = python -c "import version; print(version.version)";
              $rcVersion = $version + " Release";
          }
          echo "v:'${version}',rcv:'${rcVersion}'";
          echo "isPreRelease=${isPreReleaseBool}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append;
          echo "Version=${version}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append;
          echo "RCVersion=< ${rcVersion} >" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append;

      - name: Build ${{ env.Version }}
        run: |
          pwsh ./buildLauncher.ps1;

      - name: Commit Build File
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: ${{ env.RCVersion }}  ${{ github.event.pull_request.title }}  < Auto Release >
          tag_name: ${{ env.Version }}
          draft: false
          generate_release_notes: true
          body_path: ${{ github.workspace }}/changelog.md
          prerelease: ${{ env.isPreRelease }}
          files: ./MusyncSaveDecode/Archive/*
